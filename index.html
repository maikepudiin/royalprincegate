<!DOCTYPE html>
<html>
<head>
  <title>Pudiin Royal Prince Gate</title>

  <style>
  body {
    margin: 0;
    min-height: 100vh;
  
    background-color: #1e3a8a; 
  
    background-image: repeating-linear-gradient(
      45deg,
      rgba(255, 215, 53, 0.73) 0px,
      rgba(255, 215, 53, 0.73) 30px,
      transparent 20px,
      transparent 80px
    );
    }

  </style>


  <meta charset="UTF-8">
  <title>Pudiin RPG</title>

  <!-- AQUI É O CSS (ESTILO) -->
  <style>

    /* Remove margens padrão */
    body {
      margin: 0;
      padding-top: 140px; /* espaço pra barra fixa */
    }

    /* BARRA DO TOPO */
    .navbar {
      position: fixed;       
      top: 0;
      left: 0;
      width: 100%;
      height: 120px;

      display: flex;
      align-items: center;
      justify-content: space-between;

      padding: 0 40px;

      background-image: url("speech_balloon.png"); 
      background-size: contain;
      background-repeat: repeat-x;

      z-index: 1000;
    }

    /* Logo */
    .logo {
      height: 90px;
    }

    /* Links do menu */
    nav a {
      text-decoration: none;
      color: white;
      font-size: 24px;
      margin-left: 40px;
      font-weight: bold;
    }

    nav a:hover {
      color: yellow;
    }

    /* Só pra testar o scroll */
    section {
      height: 600px;
    }

  </style>
</head>

<body>

  <!-- AQUI É A BARRA -->
  <header class="navbar">
    
    <img src="logo_pudiin.png" class="logo">

    <nav>
      <a href="#home">HOME</a>
      <a href="#about">ABOUT</a>
      <a href="#characters">CHARACTERS</a>
      <a href="#newsletter">NEWSLETTER</a>
      <a href="#team">TEAM</a>
    </nav>

  </header>

  <!-- PARTES DO SITE -->
  <section id="home"></section>
  <section id="about"></section>
  <section id="characters"></section>
  <section id="newsletter"></section>
  <section id="team"></section>

</body>
</html>
