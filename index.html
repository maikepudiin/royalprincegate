<!DOCTYPE html>
<html>
<head>
  <title>Pudiin Royal Prince Gate</title>

  <style>
  body {
    margin: 0;
    min-height: 100vh;
  
    background-color: #1e3a8a; 
  
    background-image: repeating-linear-gradient(
      45deg,
      rgba(255, 215, 53, 0.73) 0px,
      rgba(255, 215, 53, 0.73) 30px,
      transparent 20px,
      transparent 80px
    );
    }

  </style>

  <meta charset="UTF-8">
  <title>Pudiin RPG</title>

  <!-- AQUI É O CSS (ESTILO) -->
  <style>

    /* Remove margens padrão */
    body {
      margin: 0;
      padding-top: 140px; /* espaço pra barra fixa */
    }

    /* BARRA DO TOPO */
    .navbar {
      position: fixed;
      top: 30px;
      left: 300px; /* começa depois da logo */
      right: 0;
      height: 90px;

    
      border: 30px solid transparent;
    
      border-image: url("speech_balloon.png") 30 fill stretch;
    
      z-index: 1000;
    }

    /* Logo */
    .logo {
      position: fixed;
      top: 30px;
      left: 20px;
      height: 230px; /* aumentamos aqui */
      z-index: 2000;
    }

    /* Links do menu */
    nav a {
      text-decoration: none;
      color: black;
      font-size: 40px;
      margin-left: 100px;
      font-weight: bold;
    }

    nav a:hover {
      color: yellow;
    }

    /* Só pra testar o scroll */
    section {
      height: 1200px;
    }

  </style>
</head>

<body>

  <!-- AQUI É A BARRA -->
  <header class="navbar">
    
    <img src="logo_pudiin.png" class="logo">

    <nav>
      <a href="#home">HOME</a>
      <a href="#about">ABOUT</a>
      <a href="#characters">CHARACTERS</a>
      <a href="#newsletter">NEWSLETTER</a>
      <a href="#team">TEAM</a>
    </nav>

  </header>

  <!-- PARTES DO SITE -->
  <section id="home">



    
  </section>

  <section id="about">
    <h1>Caguei</h1>
  </section>
  <section id="characters"></section>
  <section id="newsletter"></section>

  
<section id="team" class="team-section">

<section id="team" class="team-section">

  <h2 class="team-title">TEAM</h2>

  <!-- A CAIXA COM O BALÃO -->
  <div class="team-box">

    <div class="team-container">

      <div class="team-member">
        <img src="membro1.png" class="team-img">
        <div class="team-info">
          <h3>Nome 1</h3>
          <p>Função</p>
        </div>
      </div>

      <div class="team-member">
        <img src="membro2.png" class="team-img">
        <div class="team-info">
          <h3>Nome 2</h3>
          <p>Função</p>
        </div>
      </div>

      <div class="team-member">
        <img src="membro3.png" class="team-img">
        <div class="team-info">
          <h3>Nome 3</h3>
          <p>Função</p>
        </div>
      </div>

      <div class="team-member">
        <img src="membro4.png" class="team-img">
        <div class="team-info">
          <h3>Nome 4</h3>
          <p>Função</p>
        </div>
      </div>

    </div>

  </div>

</section>

  <style>
/* SEÇÃO */
.team-section {
  padding: 120px 0;
  text-align: center;
}

/* TÍTULO */
.team-title {
  font-size: 80px;
  color: #1e90ff;
  -webkit-text-stroke: 3px black;
  margin-bottom: 60px;
}

    /* CAIXA DO BALÃO */
.team-box {

  width: 80%;
  margin: 0 auto;
  padding: 40px;

  border-style: solid;
  border-color: transparent;

  border-width: 6px;
  border-image: url("speech_balloon.png") 6 fill stretch;
  image-rendering: pixelated;

  box-sizing: border-box;
}
    
/* Container dos membros */
.team-container {
  display: flex;
  flex-direction: column;
  gap: 50px;
}

/* Cada membro */
.team-member {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 40px;
}

/* Imagem */
.team-img {
  width: 180px;
  height: 180px;
  object-fit: cover;
  border: 4px solid black;
}

/* Texto */
.team-info h3 {
  font-size: 32px;
  margin: 0;
}

.team-info p {
  font-size: 20px;
  margin: 5px 0 0 0;
}

    
  </style>

</section>

</body>
</html>
