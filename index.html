<!DOCTYPE html>
<html>
<head>
  <title>Pudiin Royal Prince Gate</title>

  <style>
  body {
    margin: 0;
    min-height: 100vh;
  
    background-color: #1e3a8a; 
  
    background-image: repeating-linear-gradient(
      45deg,
      rgba(255, 215, 53, 0.73) 0px,
      rgba(255, 215, 53, 0.73) 30px,
      transparent 20px,
      transparent 80px
    );
    }

  </style>

  <meta charset="UTF-8">
  <title>Pudiin RPG</title>

  <!-- AQUI É O CSS (ESTILO) -->
  <style>

    /* Remove margens padrão */
    body {
      margin: 0;
      padding-top: 140px; /* espaço pra barra fixa */
    }

    /* BARRA DO TOPO */
    .navbar {
      position: fixed;
      top: 30px;
      left: 300px; /* começa depois da logo */
      right: 0;
      height: 90px;

    
      border: 30px solid transparent;
    
      border-image: url("speech_balloon.png") 30 fill stretch;
    
      z-index: 1000;
    }

    /* Logo */
    .logo {
      position: fixed;
      top: 30px;
      left: 20px;
      height: 230px; /* aumentamos aqui */
      z-index: 2000;
    }

    /* Links do menu */
    nav a {
      text-decoration: none;
      color: black;
      font-size: 40px;
      margin-left: 100px;
      font-weight: bold;
    }

    nav a:hover {
      color: yellow;
    }

    /* Só pra testar o scroll */
    section {
      height: 1200px;
    }

  </style>
</head>

<body>

  <!-- AQUI É A BARRA -->
  <header class="navbar">
    
    <img src="logo_pudiin.png" class="logo">

    <nav>
      <a href="#home">HOME</a>
      <a href="#about">ABOUT</a>
      <a href="#characters">CHARACTERS</a>
      <a href="#newsletter">NEWSLETTER</a>
      <a href="#team">TEAM</a>
    </nav>

  </header>

  <!-- PARTES DO SITE -->
  <section id="home">



    
  </section>

  <section id="about">
    <h1>Caguei</h1>
  </section>
  <section id="characters"></section>
  <section id="newsletter"></section>

  
<section id="team" class="team-section">

  <h2 class="team-title">OUR TEAM</h2>
  <div class="team-box">
    
  <div class="team-container">

    <div class="team-member">
      <img src="maikepudiin.png" class="team-img">
      <div class="team-info">
        <h3>maikepudiin</h3>
        <p>Creator, Director, Main Programmer</p>
      </div>
    </div>
  </div>

    
    <div class="team-member">
      <img src="cass.png" class="team-img">
      <div class="team-info">
        <h3>Cass</h3>
        <p>Main Artist, Concept Artist, Designer </p>
      </div>
    </div>

    <div class="team-member">
  <img src="perodliz.png" class="team-img">
  <div class="team-info">
    <h3>PerodLiz</h3>
    <p>Main Pixel Artist, Main Composer</p>
  </div>
</div>
    
    <div class="team-member">
  <img src="willarcade.png" class="team-img">
  <div class="team-info">
    <h3>WillArcade</h3>
    <p>Additional Pixel Artist, Gametesting</p>
  </div>
</div>

  </div>

  <style>
/* SEÇÃO TEAM */
.team-section {
  padding: 120px 0;
  text-align: center;
}

    /* CAIXA DO BALÃO */
.team-box {

  width: 80%;          /* NÃO ocupa tudo */
  margin: 0 auto;      /* centraliza */
  padding: 60px 40px;

  border-style: solid;
  border-color: transparent;

  /* Ajuste esses valores conforme sua sprite */
  border-width: 60px 20px 60px 20px;

  border-image: url("speech_balloon.png") 60 20 60 20 fill stretch;

  box-sizing: border-box;
}
/* TÍTULO GRANDE */
.team-title {
  font-size: 80px;
  color: #1e90ff; /* azul */

  /* Outline preta */
  -webkit-text-stroke: 3px black;

  margin-bottom: 80px;
}

/* Container dos membros */
.team-container {
  display: flex;
  flex-direction: column;
  gap: 50px;
}

/* Cada membro */
.team-member {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 40px;
}

/* Imagem */
.team-img {
  width: 200px;
  height: 200px;
  object-fit: cover;
  border: 4px solid black;
}

/* Texto do membro */
.team-info h3 {
  font-size: 32px;
  margin: 0;
}

.team-info p {
  font-size: 20px;
  margin: 5px 0 0 0;
}

    
  </style>

</section>

</body>
</html>
